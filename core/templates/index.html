{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBG — Only what you need!</title>
<link rel="shortcut icon" href="favicon.png">
<link rel="icon" href="{% static 'img/favicon.png' %}">

<style>


@import url('https://fonts.googleapis.com/css2?family=Inspiration&family=Mulish:wght@200..900&family=Unbounded:wght@200..900&display=swap');

/* ===== PAGE CENTERING ===== */

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background: linear-gradient(319deg,#fb3f3f 0%, #fc4646 100%);
}

/* ===== GLASS CARD ===== */

.signup_card{

width:520px;
max-width:90%;

margin:auto;

padding:45px;

border-radius:22px;

background: rgba(255,255,255,0.15);
backdrop-filter: blur(25px);

border:1px solid rgba(255,255,255,0.35);

box-shadow:
0 20px 50px rgba(0,0,0,0.25),
inset 0 0 15px rgba(255,255,255,0.2);

display:flex;
flex-direction:column;
align-items:center;

}

.avatar-preview {
    width:120px;
    height:120px;
    border-radius:100px;
    background: rgba(255,255,255,0.2);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    border:2px solid rgba(255,255,255,0.4);
    cursor:pointer;
    position:relative;
}

.avatar-preview span{
    color:white;
    font-size:14px;
    opacity:0.8;
}

.avatar-preview img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ===== TITLE ===== */

.maintxt{
font-family:'Inspiration';
font-size:60px;
color:white;
text-align:center;
margin-bottom:20px;
}

/* ===== FORM ===== */

.signup_form{
font-family:'Unbounded';
color:white;

width:100%;
max-width:420px;
margin:auto;
}

/* ===== FIELDS ===== */

.inpudivs{
margin-bottom:18px;
width:100%;
}

h3{
margin-bottom:8px;
}

/* ===== INPUTS ===== */

input, textarea{

width:100%;
padding:12px;

border-radius:12px;

border:1px solid rgba(255,255,255,0.4);

background: rgba(255,255,255,0.18);

color:white;

font-family:'Mulish';
font-size:16px;

backdrop-filter: blur(10px);

outline:none;

transition:.25s;
}

input:focus,
textarea:focus{
border:1px solid white;
}

/* ===== AVATAR PREVIEW ===== */

.avatar-preview{

width:120px;
height:120px;

margin:10px auto 15px auto;

border-radius:100px;

background: rgba(255,255,255,0.2);

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;

border:2px solid rgba(255,255,255,0.4);
}

.avatar-preview img{
width:100%;
height:100%;
object-fit:cover;
}

/* ===== BUTTON ===== */

.sbnbtn{

width:100%;
margin-top:20px;

padding:12px;

border-radius:14px;

border:2px solid white;

background: rgba(255,255,255,0.2);

color:white;

font-family:'Unbounded';
font-size:16px;

cursor:pointer;

transition:.35s;
}

.sbnbtn:hover{
background:white;
color:#fb3f3f;
transform:translateY(-3px);
}

</style>
</head>

<body>

<div class="signup_card">

<h1 class="maintxt">Sign Up</h1>

<form class="signup_form" method="post" enctype="multipart/form-data">
{% csrf_token %}

<div class="inpudivs">
<h3>First Name</h3>
{{form.first_name}}
</div>

<div class="inpudivs">
<h3>Last Name</h3>
{{form.last_name}}
</div>

<div class="inpudivs">
<h3>Email</h3>
{{form.email}}
</div>

<div class="inpudivs">
<h3>Phone</h3>
{{form.phone}}
</div>

<div class="inpudivs">
<h3>Message</h3>
{{form.message}}
</div>

<div class="inpudivs">
<h3>Your avatar</h3>

<div class="avatar-preview" id="avatarBox">
    <img id="avatarPreview" src="" style="display:none;">
    <span id="avatarText">Upload</span>
</div>

<input type="file" name="avatar" id="avatarInput" accept="image/*" hidden>

</div>

<input type="submit" class="sbnbtn" value="Submit">

</form>

</div>

<script>

const avatarBox = document.getElementById("avatarBox")
const avatarInput = document.getElementById("avatarInput")
const preview = document.getElementById("avatarPreview")
const text = document.getElementById("avatarText")

avatarBox.onclick = () => avatarInput.click()

avatarInput.addEventListener("change", function () {
    const file = this.files[0]
    if (!file) return

    const reader = new FileReader()
    const img = new Image()

    reader.onload = e => img.src = e.target.result
    reader.readAsDataURL(file)

    img.onload = () => {

        const size = 300

        const canvas = document.createElement("canvas")
        const ctx = canvas.getContext("2d")

        canvas.width = size
        canvas.height = size

        let sx, sy, sSize

        if (img.width > img.height) {
            sSize = img.height
            sx = (img.width - img.height) / 2
            sy = 0
        } else {
            sSize = img.width
            sx = 0
            sy = (img.height - img.width) / 2
        }

        ctx.drawImage(img, sx, sy, sSize, sSize, 0, 0, size, size)

        canvas.toBlob(blob => {

            const newFile = new File([blob], "avatar.jpg", {
                type: "image/jpeg",
                lastModified: Date.now()
            })

            const dt = new DataTransfer()
            dt.items.add(newFile)
            avatarInput.files = dt.files

            preview.src = URL.createObjectURL(blob)
            preview.style.display = "block"
            text.style.display = "none"

        }, "image/jpeg", 0.7)

    }
})

</script>

</body>
</html>
